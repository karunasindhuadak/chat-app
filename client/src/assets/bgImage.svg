<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 960" preserveAspectRatio="xMidYMid slice">
  <defs>
    <clipPath id="c"><rect width="1440" height="960"/></clipPath>

    <!-- Base dark gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a12"/>
      <stop offset="50%" stop-color="#0d0f1a"/>
      <stop offset="100%" stop-color="#06060e"/>
    </linearGradient>

    <!-- Ambient glow: deep violet, upper-right -->
    <radialGradient id="g1" cx="78%" cy="18%" r="40%">
      <stop offset="0%" stop-color="#4a2fbd" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#4a2fbd" stop-opacity="0"/>
    </radialGradient>

    <!-- Ambient glow: warm rose, lower-left -->
    <radialGradient id="g2" cx="18%" cy="82%" r="38%">
      <stop offset="0%" stop-color="#b8366a" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#b8366a" stop-opacity="0"/>
    </radialGradient>

    <!-- Ambient glow: teal, center-left -->
    <radialGradient id="g3" cx="30%" cy="40%" r="30%">
      <stop offset="0%" stop-color="#1a6e7a" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#1a6e7a" stop-opacity="0"/>
    </radialGradient>

    <!-- Ambient glow: soft blue, center -->
    <radialGradient id="g4" cx="55%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#1e2a5e" stop-opacity="0.2"/>
      <stop offset="60%" stop-color="#141a3a" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0a0a12" stop-opacity="0"/>
    </radialGradient>

    <!-- Ambient glow: faint orange, bottom-right -->
    <radialGradient id="g5" cx="85%" cy="75%" r="28%">
      <stop offset="0%" stop-color="#c4602a" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#c4602a" stop-opacity="0"/>
    </radialGradient>

    <!-- Vignette -->
    <radialGradient id="vig" cx="50%" cy="50%" r="56%">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="72%" stop-color="#000" stop-opacity="0"/>
      <stop offset="92%" stop-color="#000" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.88"/>
    </radialGradient>

    <!-- Noise filter -->
    <filter id="noise" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.55" numOctaves="3" stitchTiles="stitch" result="n"/>
      <feColorMatrix type="saturate" values="0" in="n" result="m"/>
      <feBlend in="SourceGraphic" in2="m" mode="overlay"/>
    </filter>

    <!-- Mesh blur for organic blobs -->
    <filter id="blob" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>

    <!-- Lighter blur for smaller shapes -->
    <filter id="blobSm" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="35"/>
    </filter>
  </defs>

  <g clip-path="url(#c)">
    <!-- 1: Dark base -->
    <rect width="1440" height="960" fill="url(#bg)"/>

    <!-- 2: Soft ambient glows -->
    <rect width="1440" height="960" fill="url(#g4)"/>
    <rect width="1440" height="960" fill="url(#g1)"/>
    <rect width="1440" height="960" fill="url(#g2)"/>
    <rect width="1440" height="960" fill="url(#g3)"/>
    <rect width="1440" height="960" fill="url(#g5)"/>

    <!-- 3: Organic gradient mesh blobs — gives depth like a modern mesh gradient -->
    <g opacity="0.7">
      <!-- Large violet blob upper area -->
      <ellipse cx="980" cy="180" rx="320" ry="240" fill="#3b1f8e" opacity="0.14" filter="url(#blob)"/>
      <!-- Rose blob lower-left -->
      <ellipse cx="280" cy="740" rx="260" ry="200" fill="#92274e" opacity="0.12" filter="url(#blob)"/>
      <!-- Teal blob mid-left -->
      <ellipse cx="350" cy="380" rx="200" ry="180" fill="#135e6b" opacity="0.1" filter="url(#blob)"/>
      <!-- Deep blue blob center -->
      <ellipse cx="720" cy="480" rx="400" ry="280" fill="#0f1d4a" opacity="0.18" filter="url(#blob)"/>
      <!-- Warm accent blob bottom-right -->
      <ellipse cx="1200" cy="700" rx="220" ry="170" fill="#7a3a18" opacity="0.07" filter="url(#blob)"/>
    </g>

    <!-- 4: Secondary smaller blobs for richness -->
    <g opacity="0.5">
      <circle cx="1100" cy="120" r="90" fill="#6c3cbf" opacity="0.12" filter="url(#blobSm)"/>
      <circle cx="160" cy="200" r="70" fill="#1a6e7a" opacity="0.1" filter="url(#blobSm)"/>
      <circle cx="1340" cy="500" r="80" fill="#4a2fbd" opacity="0.08" filter="url(#blobSm)"/>
      <circle cx="600" cy="820" r="100" fill="#92274e" opacity="0.08" filter="url(#blobSm)"/>
      <circle cx="850" cy="150" r="60" fill="#b8366a" opacity="0.06" filter="url(#blobSm)"/>
    </g>

    <!-- 5: Abstract flowing curves — unique decorative shapes -->
    <g opacity="0.06" fill="none" stroke-linecap="round">
      <!-- Flowing wave 1 -->
      <path d="M-50,600 C200,500 400,700 700,550 C1000,400 1200,650 1500,520" 
            stroke="#8b6cef" stroke-width="1.5"/>
      <!-- Flowing wave 2 -->
      <path d="M-50,650 C250,550 450,750 750,600 C1050,450 1250,700 1500,570" 
            stroke="#8b6cef" stroke-width="1"/>
      <!-- Flowing wave 3 -->
      <path d="M-50,380 C300,320 500,450 800,350 C1100,250 1300,420 1500,340" 
            stroke="#4a8fb8" stroke-width="1.2"/>
      <!-- Flowing wave 4 -->
      <path d="M-50,420 C320,360 520,490 820,390 C1120,290 1320,460 1500,380" 
            stroke="#4a8fb8" stroke-width="0.8"/>
    </g>

    <!-- 6: Constellation-style scattered dots -->
    <g opacity="0.25">
      <circle cx="95" cy="65" r="1.2" fill="#c4b5fd"/><circle cx="230" cy="130" r="0.8" fill="#c4b5fd"/>
      <circle cx="410" cy="88" r="1" fill="#c4b5fd"/><circle cx="580" cy="45" r="0.7" fill="#c4b5fd"/>
      <circle cx="720" cy="115" r="1.1" fill="#c4b5fd"/><circle cx="890" cy="72" r="0.9" fill="#c4b5fd"/>
      <circle cx="1050" cy="140" r="1.3" fill="#c4b5fd"/><circle cx="1220" cy="55" r="0.8" fill="#c4b5fd"/>
      <circle cx="1370" cy="120" r="1" fill="#c4b5fd"/>
      <circle cx="140" cy="290" r="0.9" fill="#a5b4fc"/><circle cx="310" cy="340" r="1.1" fill="#a5b4fc"/>
      <circle cx="530" cy="270" r="0.7" fill="#a5b4fc"/><circle cx="690" cy="320" r="1" fill="#a5b4fc"/>
      <circle cx="870" cy="250" r="0.8" fill="#a5b4fc"/><circle cx="1080" cy="310" r="1.2" fill="#a5b4fc"/>
      <circle cx="1270" cy="280" r="0.9" fill="#a5b4fc"/><circle cx="1400" cy="340" r="0.7" fill="#a5b4fc"/>
      <circle cx="80" cy="500" r="1" fill="#93c5fd"/><circle cx="260" cy="540" r="0.8" fill="#93c5fd"/>
      <circle cx="480" cy="480" r="1.1" fill="#93c5fd"/><circle cx="650" cy="530" r="0.9" fill="#93c5fd"/>
      <circle cx="840" cy="470" r="0.7" fill="#93c5fd"/><circle cx="1020" cy="520" r="1.2" fill="#93c5fd"/>
      <circle cx="1190" cy="490" r="1" fill="#93c5fd"/><circle cx="1350" cy="550" r="0.8" fill="#93c5fd"/>
      <circle cx="170" cy="700" r="0.8" fill="#c4b5fd"/><circle cx="360" cy="740" r="1" fill="#c4b5fd"/>
      <circle cx="540" cy="690" r="1.2" fill="#c4b5fd"/><circle cx="750" cy="730" r="0.9" fill="#c4b5fd"/>
      <circle cx="930" cy="680" r="0.7" fill="#c4b5fd"/><circle cx="1130" cy="720" r="1.1" fill="#c4b5fd"/>
      <circle cx="1310" cy="700" r="0.8" fill="#c4b5fd"/>
      <circle cx="110" cy="880" r="1.1" fill="#a5b4fc"/><circle cx="300" cy="910" r="0.8" fill="#a5b4fc"/>
      <circle cx="500" cy="860" r="0.9" fill="#a5b4fc"/><circle cx="700" cy="920" r="1" fill="#a5b4fc"/>
      <circle cx="920" cy="870" r="0.7" fill="#a5b4fc"/><circle cx="1100" cy="900" r="1.2" fill="#a5b4fc"/>
      <circle cx="1280" cy="860" r="0.9" fill="#a5b4fc"/><circle cx="1420" cy="930" r="0.8" fill="#a5b4fc"/>
    </g>

    <!-- 7: Subtle connecting lines between some dots (constellation feel) -->
    <g opacity="0.04" stroke="#a5b4fc" stroke-width="0.5" fill="none">
      <line x1="95" y1="65" x2="230" y2="130"/>
      <line x1="410" y1="88" x2="580" y2="45"/>
      <line x1="580" y1="45" x2="720" y2="115"/>
      <line x1="890" y1="72" x2="1050" y2="140"/>
      <line x1="1050" y1="140" x2="1220" y2="55"/>
      <line x1="140" y1="290" x2="310" y2="340"/>
      <line x1="530" y1="270" x2="690" y2="320"/>
      <line x1="870" y1="250" x2="1080" y2="310"/>
      <line x1="80" y1="500" x2="260" y2="540"/>
      <line x1="480" y1="480" x2="650" y2="530"/>
      <line x1="840" y1="470" x2="1020" y2="520"/>
      <line x1="1190" y1="490" x2="1350" y2="550"/>
      <line x1="170" y1="700" x2="360" y2="740"/>
      <line x1="540" y1="690" x2="750" y2="730"/>
      <line x1="930" y1="680" x2="1130" y2="720"/>
    </g>

    <!-- 8: Film grain -->
    <rect width="1440" height="960" fill="transparent" filter="url(#noise)" opacity="0.03"/>

    <!-- 9: Vignette overlay -->
    <rect width="1440" height="960" fill="url(#vig)"/>
  </g>
</svg>
