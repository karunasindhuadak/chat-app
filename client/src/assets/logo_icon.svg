<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 370" width="440" height="370">
  <defs>
    <!-- Purple bubble gradient -->
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9B4FE8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C44FA0;stop-opacity:1" />
    </linearGradient>
    <!-- Teal bubble gradient -->
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2A7E7E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A5E6E;stop-opacity:1" />
    </linearGradient>
  </defs>



  <!-- Purple speech bubble (back, top-left) -->
  <g>
    <!-- Main rounded rect -->
    <rect x="40" y="30" width="260" height="180" rx="28" ry="28" fill="url(#purpleGrad)"/>
    <!-- Tail pointing bottom-left -->
    <polygon points="80,210 55,258 130,210" fill="url(#purpleGrad)"/>
    <!-- Three dots -->
    <circle cx="120" cy="122" r="18" fill="white" opacity="0.95"/>
    <circle cx="170" cy="122" r="18" fill="white" opacity="0.65"/>
    <circle cx="220" cy="122" r="18" fill="white" opacity="0.45"/>
  </g>

  <!-- Teal speech bubble (front, bottom-right) -->
  <g>
    <!-- Main rounded rect -->
    <rect x="140" y="155" width="260" height="160" rx="24" ry="24" fill="url(#tealGrad)"/>
    <!-- Tail pointing bottom-right -->
    <polygon points="340,315 385,358 310,315" fill="#1A5E6E"/>
    <!-- Two horizontal lines -->
    <rect x="178" y="207" width="180" height="14" rx="7" fill="white" opacity="0.55"/>
    <rect x="178" y="238" width="130" height="14" rx="7" fill="white" opacity="0.4"/>
  </g>


</svg>
