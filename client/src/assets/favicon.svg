<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background: dark diagonal from chat-bg.svg -->
    <linearGradient id="f_bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a12"/>
      <stop offset="50%" stop-color="#0d0f1a"/>
      <stop offset="100%" stop-color="#06060e"/>
    </linearGradient>

    <!-- Violet mesh glow -->
    <radialGradient id="f_gv" cx="70%" cy="25%" r="50%">
      <stop offset="0%" stop-color="#4a2fbd" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4a2fbd" stop-opacity="0"/>
    </radialGradient>

    <!-- Rose mesh glow -->
    <radialGradient id="f_gr" cx="25%" cy="78%" r="45%">
      <stop offset="0%" stop-color="#b8366a" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#b8366a" stop-opacity="0"/>
    </radialGradient>

    <!-- Teal accent glow -->
    <radialGradient id="f_gt" cx="20%" cy="30%" r="35%">
      <stop offset="0%" stop-color="#1a6e7a" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1a6e7a" stop-opacity="0"/>
    </radialGradient>

    <!-- Main bubble gradient: violet → rose -->
    <linearGradient id="f_bub" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b6cef"/>
      <stop offset="45%" stop-color="#6c3cbf"/>
      <stop offset="100%" stop-color="#b8366a"/>
    </linearGradient>

    <!-- Secondary bubble gradient: teal → deep violet -->
    <linearGradient id="f_bub2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a6e7a"/>
      <stop offset="60%" stop-color="#135e6b"/>
      <stop offset="100%" stop-color="#3b1f8e"/>
    </linearGradient>

    <!-- Inner shine on main bubble -->
    <linearGradient id="f_shine" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#c4b5fd" stop-opacity="0"/>
    </linearGradient>

    <!-- Drop shadow -->
    <filter id="f_sh">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#3b1f8e" flood-opacity="0.6"/>
    </filter>

    <!-- Soft glow behind icon -->
    <filter id="f_gl" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#f_bg)"/>

  <!-- Ambient mesh glows (like chat-bg.svg) -->
  <rect width="512" height="512" rx="108" fill="url(#f_gv)"/>
  <rect width="512" height="512" rx="108" fill="url(#f_gr)"/>
  <rect width="512" height="512" rx="108" fill="url(#f_gt)"/>

  <!-- Constellation dots (4 tiny stars from chat-bg palette) -->
  <circle cx="90" cy="100" r="3" fill="#c4b5fd" opacity="0.3"/>
  <circle cx="420" cy="80" r="2.5" fill="#a5b4fc" opacity="0.25"/>
  <circle cx="440" cy="430" r="3" fill="#93c5fd" opacity="0.2"/>
  <circle cx="75" cy="400" r="2" fill="#c4b5fd" opacity="0.2"/>

  <!-- Main chat bubble (sender, larger, upper-left) -->
  <g filter="url(#f_sh)">
    <path d="
      M100,115
      h210
      a42,42 0 0 1 42,42
      v100
      a42,42 0 0 1 -42,42
      h-140
      l-40,48
      v-48
      h-30
      a42,42 0 0 1 -42,-42
      v-100
      a42,42 0 0 1 42,-42
      z
    " fill="url(#f_bub)"/>
    <!-- Shine overlay -->
    <path d="
      M100,115
      h210
      a42,42 0 0 1 42,42
      v100
      a42,42 0 0 1 -42,42
      h-140
      l-40,48
      v-48
      h-30
      a42,42 0 0 1 -42,-42
      v-100
      a42,42 0 0 1 42,-42
      z
    " fill="url(#f_shine)"/>
  </g>

  <!-- Typing indicator dots inside main bubble -->
  <circle cx="175" cy="210" r="16" fill="#ffffff" opacity="0.92"/>
  <circle cx="225" cy="210" r="16" fill="#ffffff" opacity="0.65"/>
  <circle cx="275" cy="210" r="16" fill="#ffffff" opacity="0.38"/>

  <!-- Reply chat bubble (receiver, smaller, lower-right, overlapping) -->
  <g filter="url(#f_gl)">
    <path d="
      M200,280
      h195
      a36,36 0 0 1 36,36
      v72
      a36,36 0 0 1 -36,36
      h10
      l35,42
      v-42
      h-10
      a0,0 0 0 1 0,0
      h-230
      a36,36 0 0 1 -36,-36
      v-72
      a36,36 0 0 1 36,-36
      z
    " fill="url(#f_bub2)"/>
  </g>

  <!-- Text lines inside reply bubble -->
  <rect x="230" y="325" width="130" height="14" rx="7" fill="#ffffff" opacity="0.75"/>
  <rect x="230" y="352" width="80" height="14" rx="7" fill="#ffffff" opacity="0.4"/>
</svg>
